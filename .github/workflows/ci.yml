name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ldaca-web-app-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: macos
            os: macos-latest
          - name: windows
            os: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Extract frontend build archive
        shell: bash
        run: |
          FRONTEND_RES=src/ldaca_web_app/resources/frontend
          if [ -f "$FRONTEND_RES/build.tar.gz" ]; then
            tar -xzf "$FRONTEND_RES/build.tar.gz" -C "$FRONTEND_RES"
            echo "Frontend build extracted"
          else
            echo "No frontend archive found — skipping extraction"
          fi

      - name: Install dependencies
        shell: bash
        run: uv sync --group dev

      - name: Run tests
        shell: bash
        run: |
          set +e
          output=$(uv run pytest -q 2>&1)
          pytest_exit=$?
          set -e
          printf '%s\n' "$output"
          if [ "$pytest_exit" -ne 0 ]; then
            # Known Python 3.14 / Windows interpreter-shutdown bugs that
            # fire AFTER all tests pass:
            #   - ``Fatal Python error: tstate_delete_common: NULL interpreter``
            #     (exit 127, sporadic)
            #   - ``Fatal Python error: _PyImport_Init: global import state already initialized``
            #     (exit 1, sporadic)
            # Both produce a "Fatal Python error:" line on the way out.
            # Treat the step as success when we're on Windows, the
            # process printed a passing pytest summary, and the only
            # failure mode is a Fatal Python error during shutdown.
            if [ "$RUNNER_OS" = "Windows" ] && \
               printf '%s' "$output" | grep -q "Fatal Python error:" && \
               printf '%s' "$output" | grep -qE "[0-9]+ passed.*in [0-9.]+s" && \
               ! printf '%s' "$output" | grep -qE "[0-9]+ failed|[0-9]+ error"; then
              echo "::warning::Python 3.14 Windows interpreter shutdown crash detected after a passing test run; treating as success."
              exit 0
            fi
            exit "$pytest_exit"
          fi

      - name: Build distributions
        shell: bash
        run: uv build
