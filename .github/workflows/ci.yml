name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ldaca-web-app-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: macos
            os: macos-latest
          - name: windows
            os: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Extract frontend build archive
        shell: bash
        run: |
          FRONTEND_RES=src/ldaca_web_app/resources/frontend
          if [ -f "$FRONTEND_RES/build.tar.gz" ]; then
            tar -xzf "$FRONTEND_RES/build.tar.gz" -C "$FRONTEND_RES"
            echo "Frontend build extracted"
          else
            echo "No frontend archive found — skipping extraction"
          fi

      - name: Install dependencies
        shell: bash
        run: uv sync --group dev

      - name: Run tests
        shell: bash
        run: uv run pytest -q

      - name: Build distributions
        shell: bash
        run: uv build
