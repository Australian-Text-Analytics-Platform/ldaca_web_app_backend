name: Package And Release

on:
    pull_request:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            publish_target:
                description: Optional package index for a manual publish of the selected ref
                type: choice
                required: true
                default: none
                options:
                    - none
                    - testpypi

concurrency:
    group: ldaca-web-app-backend-release-${{ github.ref }}
    cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
    contents: read

jobs:
    build_distributions:
        name: Build Distributions
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Check out ldaca-tabulator
              uses: actions/checkout@v6
              with:
                  repository: Australian-Text-Analytics-Platform/ldaca-tabulator
                  ref: ldaca_web_app_integration
                  path: ldaca-tabulator

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.14"

            - name: Set up uv
              uses: astral-sh/setup-uv@v6

            - name: Patch ldaca-loader source for standalone release builds
              shell: python
              run: |
                  from pathlib import Path

                  pyproject_path = Path("pyproject.toml")
                  content = pyproject_path.read_text()
                  old = 'ldaca-loader = { workspace = true }'
                  new = 'ldaca-loader = { path = "ldaca-tabulator" }'

                  if old not in content:
                      raise SystemExit("Expected ldaca-loader workspace source override was not found")

                  pyproject_path.write_text(content.replace(old, new))

            - name: Build distributions
              shell: bash
              run: uv build

            - name: Verify distribution metadata
              shell: bash
              run: |
                  python -m pip install --upgrade twine
                  twine check --strict dist/*

            - name: Upload distributions
              uses: actions/upload-artifact@v7
              with:
                  name: dist
                  path: dist/*
                  if-no-files-found: error

    publish_testpypi:
        name: Publish To TestPyPI
        needs: build_distributions
        if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Download built distributions
              uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: dist

            - name: Publish package distributions to TestPyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  repository-url: https://test.pypi.org/legacy/
                  packages-dir: dist
                  skip-existing: true

    publish_pypi:
        name: Publish To PyPI
        needs: build_distributions
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Download built distributions
              uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: dist

            - name: Publish package distributions to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: dist