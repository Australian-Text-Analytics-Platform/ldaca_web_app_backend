name: Package And Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            publish_target:
                description: Optional package index for a manual publish of the selected ref
                type: choice
                required: true
                default: none
                options:
                    - none
                    - testpypi

concurrency:
    group: ldaca-web-app-release-${{ github.ref }}
    cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
    contents: read

jobs:
    build_distributions:
        name: Build Distributions
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.14"

            - name: Set up uv
              uses: astral-sh/setup-uv@v6

            - name: Extract frontend build archive
              shell: bash
              run: |
                  FRONTEND_RES=src/ldaca_web_app/resources/frontend
                  if [ -f "$FRONTEND_RES/build.tar.gz" ]; then
                    tar -xzf "$FRONTEND_RES/build.tar.gz" -C "$FRONTEND_RES"
                    echo "Frontend build extracted"
                  else
                    echo "No frontend archive found — skipping extraction"
                  fi

            - name: Build distributions
              shell: bash
              run: uv build

            - name: Verify distribution metadata
              shell: bash
              run: |
                  python -m pip install --upgrade twine
                  twine check --strict dist/*

            - name: Upload distributions
              uses: actions/upload-artifact@v7
              with:
                  name: dist
                  path: dist/*
                  if-no-files-found: error

    publish_testpypi:
        name: Publish To TestPyPI
        needs: build_distributions
        if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Download built distributions
              uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: dist

            - name: Publish package distributions to TestPyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  repository-url: https://test.pypi.org/legacy/
                  packages-dir: dist
                  skip-existing: true

    publish_pypi:
        name: Publish To PyPI
        needs: build_distributions
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Download built distributions
              uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: dist

            - name: Publish package distributions to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: dist
